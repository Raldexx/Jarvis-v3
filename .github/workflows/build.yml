name: Build F.R.I.D.A.Y.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows
          - os: macos-latest
            target: x86_64-apple-darwin
            label: macOS-Intel
          - os: macos-latest
            target: aarch64-apple-darwin
            label: macOS-Apple-Silicon
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        run: |
          rustup toolchain install stable --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version
          cargo --version

      # Linux: install system dependencies required by Tauri + WebKit
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            zenity

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: v__VERSION__
          releaseName: "F.R.I.D.A.Y. v__VERSION__"
          releaseBody: |
            ## F.R.I.D.A.Y. System Monitor

            ### Windows
            - `FRIDAY_x.x.x_x64-setup.exe` → Installer (recommended)
            - `FRIDAY_x.x.x_x64.msi` → MSI package

            ### macOS
            - `FRIDAY_x.x.x_x64.dmg` → Intel Mac
            - `FRIDAY_x.x.x_aarch64.dmg` → Apple Silicon (M1/M2/M3/M4)
            - First launch: right-click → Open (Gatekeeper bypass for unsigned builds)

            ### Linux
            - `FRIDAY_x.x.x_amd64.AppImage` → Universal (recommended)
            - `FRIDAY_x.x.x_amd64.deb` → Debian / Ubuntu
            - AppImage: `chmod +x FRIDAY_*.AppImage && ./FRIDAY_*.AppImage`

            ### Notes
            - Python 3 required for Image Tools CLI: `pip install opencv-python Pillow numpy`
            - Linux Spotify detection requires `playerctl`: `sudo apt install playerctl`
            - macOS Spotify detection uses AppleScript (built-in, no setup needed)
          releaseDraft: false
          prerelease: false
